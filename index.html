<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tra cứu tương tác thuốc - MedPlus Auto Search</title>
    
    <link rel="preload" as="image" href="https://lh3.googleusercontent.com/u/0/d/1j_iqqlApN1D2tQVi8N4a31-ZIj_YLRvX">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

        :root {
            --med-primary: #1E7134;        
            --med-dark: #145226;          
            --med-gradient: linear-gradient(135deg, #1E7134 0%, #43a047 100%); 
            
            --glass-bg: rgba(255, 255, 255, 0.12); 
            --glass-border: 1px solid rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 8px 32px rgba(30, 113, 52, 0.15); 
            
            --card-bg: rgba(255, 255, 255, 0.6); 
            --card-bg-solid: #ffffff;            
            --card-radius: 12px;
            --card-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);

            --text-heading: #1E7134;
            --text-body: #2c3e50;
            --radius: 16px; 
            --danger: #d32f2f;
            --warning: #fbc02d; 
        }

        body {
            font-family: 'Roboto', sans-serif;
            margin: 0; padding: 20px;
            background-color: #e8f5e9; 
            color: var(--text-body);
            font-size: 15px; 
            line-height: 1.6;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        /* TỐI ƯU HÓA: Sử dụng host trực tiếp từ Google để ảnh nền hiện ngay lập tức */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background-image: url('https://lh3.googleusercontent.com/u/0/d/1j_iqqlApN1D2tQVi8N4a31-ZIj_YLRvX');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            will-change: transform;
        }

        *, *:before, *:after { box-sizing: inherit; }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            min-height: auto; 
            display: flex;
            flex-direction: column;
            gap: 20px; 
            width: 100%;
        }

        .section-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius);
            box-shadow: var(--glass-shadow);
            border: var(--glass-border);
            overflow: hidden;
        }

        .header {
            padding: 25px 30px;
            text-align: center;
        }
        .header h1 { 
            margin: 0; 
            font-size: 26px; 
            font-weight: 800; 
            text-transform: uppercase; 
            color: #ffffff; 
            text-shadow: 0 1px 4px rgba(0,0,0,0.4);
            letter-spacing: 1px;
        }
        .header span {
            color: #ffffff; 
            font-weight: 700; font-size: 13px; opacity: 1;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            letter-spacing: 0.5px;
            display: block; margin-top: 5px;
        }

        .main-body {
            flex-grow: 0; 
            display: flex;
            flex-direction: column;
        }

        .footer { 
            text-align: center; padding: 15px; font-size: 13px; 
            color: var(--warning); 
            font-weight: 700;
            background: rgba(255,255,255,0.1); 
            text-shadow: 0 1px 2px rgba(0,0,0,0.5); 
        }
        
        .footer-badge {
            background: var(--med-primary);
            color: #ffffff;
            padding: 6px 16px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            text-shadow: none;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .tabs { 
            display: flex; 
            padding: 20px 20px 0 20px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            justify-content: center;
            gap: 15px;
        }
        .tab-btn {
            padding: 12px 30px; border: 1px solid rgba(255,255,255,0.4); 
            background: rgba(255,255,255,0.2);
            font-weight: 700; color: var(--med-dark); cursor: pointer;
            font-size: 13px; text-transform: uppercase; transition: all 0.3s;
            border-radius: 30px;
        }
        .tab-btn:hover { background: rgba(255,255,255,0.4); }
        .tab-btn.active { 
            color: white; 
            background: var(--med-gradient); 
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(30, 113, 52, 0.3);
        }

        .tab-content { display: none; padding: 30px; flex-grow: 1; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .search-toolbar {
            display: block; 
            background: var(--card-bg);
            box-shadow: var(--card-shadow);
            padding: 20px; 
            border-radius: var(--card-radius); 
            border: 1px solid rgba(255,255,255,0.6);
            margin-bottom: 12px;
        }
        
        .input-wrapper-integrated {
            position: relative;
            width: 100%;
        }

        input.main-input {
            width: 100%; height: 50px; 
            padding: 0 60px 0 20px; 
            font-size: 16px; 
            background: #ffffff; 
            border: 1px solid #dcdcdc; 
            border-radius: 25px; 
            outline: none;
            box-sizing: border-box; transition: all 0.2s;
            color: var(--med-dark); font-weight: 500;
        }
        input.main-input::placeholder { color: #888; font-weight: 400; }
        input.main-input:focus { 
            border-color: var(--med-primary); 
            box-shadow: 0 0 0 4px rgba(30, 113, 52, 0.15); 
        }

        .search-actions {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            display: flex; align-items: center;
        }
        
        .action-icon {
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            width: 38px; height: 38px; border-radius: 50%; transition: 0.2s; border: none;
        }
        .icon-search { color: white; background: var(--med-primary); }
        .icon-search svg { width: 20px; height: 20px; stroke-width: 2.5; }
        .icon-search:hover { background: var(--med-dark); transform: scale(1.05); }
        .icon-reset { color: white; background: var(--danger); font-size: 16px; font-weight: bold; display: none; }
        .icon-reset:hover { background: #b71c1c; transform: scale(1.1); }

        .suggestions {
            position: absolute; top: 55px; left: 0; width: 100%;
            background: #ffffff; border-radius: 10px; z-index: 100; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: none;
            max-height: 250px; overflow-y: auto; border: 1px solid #eee;
        }
        .suggestions div { padding: 14px 20px; cursor: pointer; border-bottom: 1px solid #f5f5f5; transition: 0.2s; color: #333; }
        .suggestions div:hover { background-color: rgba(30, 113, 52, 0.1); color: var(--med-primary); font-weight: 600; }

        .tags-wrapper { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; min-height: 40px; align-items: center; }
        .tag-chip {
            background: #ffffff; border: 1px solid var(--med-primary); 
            color: var(--med-primary); padding: 6px 14px;
            border-radius: 25px; font-size: 14px; font-weight: 600; 
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .tag-remove {
            width: 20px; height: 20px; background: var(--med-primary); color: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 10px; font-weight: bold; transition: 0.2s; flex-shrink: 0;
        }
        .tag-remove:hover { background: var(--danger); transform: scale(1.1); }

        .result-container { display: none; margin-top: 15px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .result-item-wrapper {
            background: var(--card-bg-solid); color: #333;
            border-radius: var(--card-radius); overflow: hidden; 
            margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05);
            max-width: 100%; overflow-wrap: break-word; 
        }

        .interaction-header {
            background: rgba(30, 113, 52, 0.08); color: var(--med-primary);
            font-weight: 700; padding: 15px 20px; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center; font-size: 15px;
            word-break: break-word; white-space: normal; 
        }

        .ddi-row { border-bottom: 1px solid #f0f0f0; display: flex; }
        
        .ddi-col-key {
            width: 25%; background-color: #fafafa; font-weight: 600; color: #555;
            padding: 12px 20px; border-right: 1px solid #f0f0f0; flex-shrink: 0; display: flex; align-items: center; 
            font-size: 16px; 
        }
        .ddi-col-val { 
            width: 75%; padding: 12px 20px; color: #222; background: #ffffff; 
            font-size: 16px; 
            line-height: 1.6; 
        }
        
        .severity-badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-weight: bold; font-size: 12px; text-transform: uppercase; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .sev-high { background: #ffebee; color: var(--danger); border: 1px solid #ef9a9a; }
        .sev-med { background: #fffde7; color: #f9a825; border: 1px solid #fff59d; }

        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .disease-card {
            background: #ffffff; border-radius: var(--card-radius);
            padding: 20px; box-shadow: var(--card-shadow);
            transition: all 0.3s; position: relative; overflow: hidden;
            display: flex; flex-direction: column; border: 1px solid #eee;
        }
        .disease-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-color: var(--med-primary); }
        .disease-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; }
        .disease-card.severe::before { background: var(--danger); }
        .disease-card.cond::before { background: var(--warning); }
        
        .d-card-header { font-weight: 700; font-size: 16px; margin-bottom: 8px; color: var(--med-primary); }
        .icd-block {
            font-size: 12px; color: #0277bd; font-weight: 500;
            margin-bottom: 10px; display: inline-block; background: #e1f5fe;
            padding: 3px 8px; border-radius: 4px;
        }
        .d-card-body { font-size: 14px; color: #444; margin-bottom: 15px; flex-grow: 1; line-height: 1.6; }
        .d-manage { 
            margin-top: auto; padding-top: 15px; border-top: 1px dashed #ddd; 
            color: var(--med-primary); font-weight: 600; font-size: 14px;
        }
        
        .empty-state { 
            text-align: center; padding: 20px; color: #444; 
            border-radius: var(--card-radius); background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.5); box-shadow: var(--card-shadow);
        }
        .empty-icon { font-size: 45px; margin-bottom: 15px; opacity:0.8; }
        .empty-text { font-weight: 500; }
        
        .inline-search-icon {
            display: inline-flex; justify-content: center; align-items: center;
            width: 24px; height: 24px; background: var(--med-primary);
            border-radius: 50%; vertical-align: middle; margin-left: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }

        .toast-msg {
            position: fixed; bottom: 30px; right: 30px; 
            background: #1E7134; box-shadow: 0 4px 15px rgba(30,113,52,0.4);
            color: white; padding: 12px 25px;
            border-radius: 50px; z-index: 9999; font-weight: 500; 
            opacity: 0; transform: translateY(20px); transition: all 0.4s; font-size: 14px;
        }

        /* --- MOBILE OVERRIDES --- */
        @media (max-width: 768px) {
            body { 
                padding: 10px !important; 
                width: 100%;
                overflow-x: hidden;
            }
            .app-container { 
                gap: 15px; 
                width: 100%;
                overflow-x: hidden;
            }
            
            .section-card { 
                border-radius: 16px !important; 
                border: 1px solid rgba(255, 255, 255, 0.3) !important; 
                box-shadow: 0 4px 15px rgba(0,0,0,0.05) !important; 
                background: rgba(255, 255, 255, 0.05) !important; 
                backdrop-filter: blur(10px); 
                width: 100%; 
            }

            .header { padding: 15px 10px; }
            .header h1 { font-size: 18px; margin-bottom: 2px; }
            .header span { font-size: 12px; margin-top: 0; }
            
            .tabs { padding: 10px; gap: 8px; }
            .tab-btn { padding: 8px 15px; font-size: 12px; }

            .tab-content { padding: 15px 10px; width: 100%; }
            
            .search-toolbar { 
                padding: 8px; 
                margin-bottom: 6px; 
                width: 100%;
            }
            
            input.main-input {
                height: 40px; 
                font-size: 16px !important; 
                padding-left: 15px;
            }

            .action-icon {
                width: 32px;
                height: 32px;
            }
            .icon-search svg {
                width: 16px;
                height: 16px;
            }
            
            .tags-wrapper { 
                margin-bottom: 6px; 
                min-height: 30px; 
            }
            .tag-chip { padding: 4px 10px; font-size: 12px; }
            
            .empty-state { padding: 15px 10px; }
            .empty-icon { font-size: 32px !important; margin-bottom: 5px !important; }
            .empty-text { font-size: 13px; }

            .ddi-row { flex-direction: column; width: 100%; }
            .ddi-col-key { 
                width: 100%; border-right: none; 
                border-bottom: 1px solid #eee; padding: 10px 15px; 
                background: #f1f8e9; color: var(--med-dark);
            }
            .ddi-col-val { 
                width: 100%; 
                padding: 10px 15px; 
                font-size: 15px; 
                line-height: 1.6;
                word-wrap: break-word; 
                overflow-wrap: break-word; 
                word-break: break-word; 
                white-space: normal;
                display: block; 
                max-width: 100vw; 
            }
            
            .result-item-wrapper { width: 100%; max-width: 100%; }
            .interaction-header {
                white-space: normal;
                word-wrap: break-word;
                overflow-wrap: break-word;
            }
            
            .card-grid { grid-template-columns: 1fr; width: 100%; }
            .footer { padding: 10px; font-size: 12px; }
            
            .toast-msg { 
                right: 50%; bottom: 20px; 
                transform: translateX(50%) translateY(20px);
                width: max-content; max-width: 90%;
            }
            .toast-msg.show { transform: translateX(50%) translateY(0) !important; }
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="header section-card">
        <div>
            <h1 style="display: flex; align-items: center; justify-content: center; gap: 12px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));">
                    <path d="M10.5 20.5l-6-6a4.95 4.95 0 1 1 7-7l6 6a4.95 4.95 0 1 1-7 7Z" fill="rgba(255,255,255,0.2)"/>
                    <line x1="8.5" y1="8.5" x2="15.5" y2="15.5"/>
                    <path d="M19 4v6m-3-3h6" stroke-width="2"/>
                </svg>
                Tra cứu tương tác thuốc
            </h1>
            <span>Hỗ trợ cán bộ y tế - BVĐK Tuyên Quang</span>
        </div>
    </div>
    
    <div class="main-body section-card">
        <div class="tabs" style="display:none;">
            <button class="tab-btn active" onclick="switchTab('tab2', this)">Tương tác Thuốc - Thuốc</button>
            <button class="tab-btn" onclick="switchTab('tab1', this)">Chống chỉ định Thuốc - Bệnh</button>
        </div>

        <div id="tab2" class="tab-content active">
            <div class="search-toolbar">
                <div class="input-wrapper-integrated">
                    <input type="text" id="ddiInput" class="main-input" placeholder="Nhập tên hoạt chất (VD: Clarithromycin)..." autocomplete="off">
                    
                    <div class="search-actions">
                        <div id="btnSearch" class="action-icon icon-search" onclick="searchDDI()" title="Tra cứu">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        </div>
                        <div id="btnReset" class="action-icon icon-reset" onclick="resetDDI()" title="Làm mới">✕</div>
                    </div>

                    <div class="suggestions" id="suggestions"></div>
                </div>
            </div>

            <div class="tags-wrapper" id="selectedTags"></div>
            <div id="ddiError" style="color:#ffffff; text-shadow:0 1px 2px rgba(0,0,0,0.5); display:none; margin-bottom:10px; font-weight:bold; padding-left:10px;">⚠ Vui lòng chọn tối thiểu 2 thuốc.</div>

            <div id="loader" class="empty-state" style="display:block;">
                <div class="empty-icon" style="font-size:30px;">⏳</div>
                <div class="empty-text">Đang đồng bộ dữ liệu...</div>
            </div>

            <div id="emptyStateDDI" class="empty-state" style="display:none;">
                <div class="empty-icon">💊 + 💊</div>
                <div class="empty-text">
                    Nhập thuốc vào danh sách rồi nhấn
                    <span class="inline-search-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </span>
                </div>
            </div>

            <div class="result-container" id="resultWrapperDDI"></div>
        </div>

        <div id="tab1" class="tab-content">
            <div class="search-toolbar">
                <div class="input-wrapper-integrated">
                    <input type="text" id="searchBenhInput" class="main-input" placeholder="Nhập tên thuốc hoặc bệnh..." onkeyup="renderBenh()">
                    <div class="search-actions">
                         <div class="action-icon icon-search" style="background:var(--med-dark); width:34px; height:34px;" onclick="showAllBenh()" title="Hiện tất cả">
                             <span style="font-size:16px;">⟳</span>
                         </div>
                    </div>
                </div>
            </div>
            <div id="resultBenh" class="card-grid">
                <div style="grid-column: 1/-1; text-align:center; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,0.3);">Nhập từ khóa để tìm kiếm...</div>
            </div>
        </div>
    </div>

    <div class="footer section-card">
        <span class="footer-badge">Khoa Dược - BVĐK Tuyên Quang</span>
    </div>

</div>

<div id="toast" class="toast-msg">Thông báo</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwtj4OJRTB3o5nhtGhBN_0mGOUpklkenB5EOrwJjDlKSEVY5ZaWpe3LuDAj31GU6pji/exec"; 
    const CACHE_KEY = "DLS_Desktop_FixICD_v4"; 

    let dbBenh = [], dbDDI = [], dbICD = [], suggestionList = [], selectedDrugs = [];

    window.onload = function() {
        if(API_URL.includes("DÁN_LINK")) {
            const loader = document.getElementById('loader');
            if(loader) loader.innerHTML = "<div class='empty-text'>⚠ Chưa dán Link Google Script!</div>";
            return;
        }
        const cached = localStorage.getItem(CACHE_KEY);
        let hasCache = false;
        if(cached) {
            try {
                const parsed = JSON.parse(cached);
                if(parsed.ddiDB && parsed.ddiDB.length > 0) {
                    processData(parsed);
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('emptyStateDDI').style.display = 'block';
                    hasCache = true;
                }
            } catch(e) {}
        }
        fetchDataFromCloud(!hasCache);
    };

    async function fetchDataFromCloud(showUI) {
        const loader = document.getElementById('loader');
        const emptyState = document.getElementById('emptyStateDDI');
        
        if(showUI) {
            if(loader) loader.style.display = 'block';
            if(emptyState) emptyState.style.display = 'none';
        }
        try {
            const res = await fetch(API_URL);
            const newData = await res.json();
            const oldStr = localStorage.getItem(CACHE_KEY);
            const newStr = JSON.stringify(newData);
            if(oldStr !== newStr) {
                localStorage.setItem(CACHE_KEY, newStr);
                processData(newData);
                if(!showUI) showToast("✔ Dữ liệu đã cập nhật!");
            }
            if(loader) loader.style.display = 'none';
            if(selectedDrugs.length === 0 && emptyState) {
                emptyState.style.display = 'block';
            }
        } catch(e) { 
            console.error(e); 
            if(showUI && loader) loader.innerHTML = "<div class='empty-text'>❌ Lỗi kết nối.</div>"; 
        }
    }

    function processData(data) {
        dbBenh = data.diseaseDB || [];
        dbDDI = data.ddiDB || [];
        dbICD = data.icdDB || [];
        const s = new Set();
        dbDDI.forEach(i => { if(i.d1) s.add(i.d1.trim()); if(i.d2) s.add(i.d2.trim()); });
        suggestionList = [...s].sort();
    }

    function showToast(msg) {
        const t = document.getElementById('toast'); t.innerText = msg;
        t.style.opacity = '1'; 
        if(window.innerWidth <= 768) {
             t.classList.add('show');
        } else {
             t.style.transform = 'translateY(0)';
        }
        setTimeout(() => { 
            t.style.opacity = '0'; 
            if(window.innerWidth <= 768) {
                t.classList.remove('show');
            } else {
                t.style.transform = 'translateY(20px)'; 
            }
        }, 3000);
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
        document.getElementById(id).classList.add('active'); btn.classList.add('active');
    }

    function createBenhCardHTML(item) {
        const isSevere = item.severity.toLowerCase().includes("chống chỉ định");
        const cls = isSevere ? "severe" : "cond";
        
        const cleanDiseaseName = item.disease.replace(/\s*\([*]+\)/g, '').trim();

        let icdDisplay = "";
        const cleanNameLower = item.disease.toLowerCase();
        
        const matchICD = dbICD.find(i => cleanNameLower.includes(i.name.toLowerCase()));

        if (matchICD) {
            icdDisplay = `🔖 ICD: <strong>${matchICD.name}</strong> - ${matchICD.detail}`;
        } else if (item.icd_short) {
            icdDisplay = `🔖 ICD: <strong>${item.icd_short}</strong>`;
        }

        const icdBlock = icdDisplay ? `<div class="icd-block">${icdDisplay}</div>` : '';
        
        let detailBlock = '';
        if(item.detail && item.detail.trim() !== '' && item.detail !== '---') {
            detailBlock = `<div class="d-card-body"><strong>Chi tiết:</strong> ${item.detail}</div>`;
        }

        return `<div class="disease-card ${cls}">
            <div class="d-card-header">${item.drug} ↔ ${cleanDiseaseName}</div>
            ${icdBlock}
            <div style="margin-bottom:8px;"><span class="severity-badge ${isSevere ? 'sev-high' : 'sev-med'}">${item.severity}</span></div>
            ${detailBlock}
            <div class="d-manage">⚕️ <strong>Xử trí:</strong> ${item.manage}</div>
        </div>`;
    }
    
    function renderBenh() {
        const q = document.getElementById('searchBenhInput').value.toLowerCase().trim();
        const div = document.getElementById('resultBenh');
        if(!q) { div.innerHTML = ""; return; }
        const res = dbBenh.filter(i => String(i.drug).toLowerCase().includes(q) || String(i.disease).toLowerCase().includes(q));
        if(res.length === 0) { div.innerHTML = "<div style='grid-column:1/-1; text-align:center; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,0.3);'>Không tìm thấy.</div>"; return; }
        div.innerHTML = res.map(createBenhCardHTML).join('');
    }
    
    function showAllBenh() {
        document.getElementById('searchBenhInput').value = "";
        document.getElementById('resultBenh').innerHTML = dbBenh.map(createBenhCardHTML).join('');
    }

    const ddiInput = document.getElementById("ddiInput");
    const suggBox = document.getElementById("suggestions");

    ddiInput.addEventListener("input", function() {
        const val = this.value.toLowerCase();
        if(!val) { suggBox.style.display = "none"; return; }
        const matches = suggestionList.filter(d => d.toLowerCase().includes(val)).slice(0, 10);
        if(matches.length === 0) { suggBox.style.display = "none"; return; }
        suggBox.innerHTML = matches.map(d => `<div onclick="selectDrug('${d}')">${d}</div>`).join('');
        suggBox.style.display = "block";
    });
    document.addEventListener("click", function(e) { if(!e.target.closest('.input-wrapper-integrated')) suggBox.style.display = "none"; });
    ddiInput.addEventListener("keypress", function(e) {
        if(e.key === "Enter") {
             if(suggBox.style.display === "block" && suggBox.children.length > 0) selectDrug(suggBox.children[0].innerText);
             else if(this.value.trim()) selectDrug(this.value.trim());
        }
    });

    function selectDrug(name) {
        if(!selectedDrugs.includes(name)) { 
            selectedDrugs.push(name); 
            renderTags(); 
            const resultWrapper = document.getElementById('resultWrapperDDI');
            if(resultWrapper.style.display === 'block' && selectedDrugs.length >= 2) {
                searchDDI();
            }
        }
        ddiInput.value = ""; suggBox.style.display = "none"; ddiInput.focus();
    }

    function removeDrug(name) {
        selectedDrugs = selectedDrugs.filter(d => d !== name); 
        renderTags();
        if(selectedDrugs.length < 2) {
            resetDDI();
        } else {
             if(document.getElementById('resultWrapperDDI').style.display === 'block') {
                 searchDDI();
             }
        }
    }

    function resetDDI() {
        selectedDrugs = []; renderTags();
        document.getElementById('emptyStateDDI').style.display = 'block';
        document.getElementById('resultWrapperDDI').style.display = 'none';
        document.getElementById('ddiError').style.display = 'none';
        document.getElementById('ddiInput').value = "";
        
        document.getElementById('btnSearch').style.display = 'flex';
        document.getElementById('btnReset').style.display = 'none';
    }

    function renderTags() {
        document.getElementById('selectedTags').innerHTML = selectedDrugs.map(d => `<div class="tag-chip">💊 ${d}<span class="tag-remove" onclick="removeDrug('${d}')">✕</span></div>`).join('');
    }

    function searchDDI() {
        if(selectedDrugs.length < 2) { document.getElementById('ddiError').style.display = 'block'; return; }
        document.getElementById('ddiError').style.display = 'none';
        document.getElementById('emptyStateDDI').style.display = 'none';
        
        document.getElementById('btnSearch').style.display = 'none';
        document.getElementById('btnReset').style.display = 'flex';
        
        let found = [];
        for(let i=0; i<selectedDrugs.length; i++) {
            for(let j=i+1; j<selectedDrugs.length; j++) {
                const a = selectedDrugs[i].toLowerCase(), b = selectedDrugs[j].toLowerCase();
                const match = dbDDI.find(item => {
                    const d1 = String(item.d1).toLowerCase(), d2 = String(item.d2).toLowerCase();
                    return (d1.includes(a) && d2.includes(b)) || (d1.includes(b) && d2.includes(a));
                });
                if(match) found.push(match);
            }
        }

        const wrapper = document.getElementById('resultWrapperDDI');
        wrapper.style.display = 'block';
        wrapper.innerHTML = ""; 

        if(found.length === 0) {
            wrapper.innerHTML = `<div style="background:#fff; border-radius:12px; padding:40px; text-align:center; color:var(--med-primary); font-weight:bold; font-size:18px; box-shadow:0 4px 15px rgba(0,0,0,0.1);">✔ Không tìm thấy tương tác trong dữ liệu.<div style="font-size:14px; color:#666; margin-top:10px; font-weight:normal">Giữa: ${selectedDrugs.join(', ')}</div></div>`;
            return;
        }

        wrapper.innerHTML = found.map((item, idx) => {
            const isSevere = item.severity.toLowerCase().includes("chống chỉ định");
            const badgeCls = isSevere ? "sev-high" : "sev-med";
            
            return `
            <div class="result-item-wrapper">
                <div class="interaction-header">
                    <span>⚠️ Cặp tương tác ${idx + 1}: ${item.d1} + ${item.d2}</span>
                </div>
                <div class="result-table">
                    <div class="ddi-row">
                        <div class="ddi-col-key">Mức độ</div>
                        <div class="ddi-col-val"><span class="severity-badge ${badgeCls}">${item.severity}</span></div>
                    </div>
                    <div class="ddi-row">
                        <div class="ddi-col-key">Nhóm tương tác</div>
                        <div class="ddi-col-val" style="color:var(--med-primary); font-weight:700;">${item.group || 'Chưa xác định'}</div>
                    </div>
                    <div class="ddi-row">
                        <div class="ddi-col-key">Hậu quả</div>
                        <div class="ddi-col-val">${item.conseq || '---'}</div>
                    </div>
                    <div class="ddi-row">
                        <div class="ddi-col-key">Cơ chế</div>
                        <div class="ddi-col-val">${item.mech || '---'}</div>
                    </div>
                    <div class="ddi-row" style="background-color:rgba(30, 113, 52, 0.08);">
                        <div class="ddi-col-key" style="color:var(--med-primary)">Xử trí</div>
                        <div class="ddi-col-val" style="font-weight:600; color:var(--med-dark);">${item.manage}</div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }
</script>

</body>
</html>
